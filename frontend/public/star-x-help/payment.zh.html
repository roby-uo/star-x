<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>star-X 支付配置说明</title><style>body{margin:0;background:#11172d;color:#e5eeff;font:16px/1.7 system-ui,-apple-system,"Microsoft YaHei",sans-serif}.page{max-width:760px;margin:0 auto;padding:48px 24px}h1{color:#fff}h2{color:#9bbdff;margin-top:32px}code{background:#29386f;padding:2px 6px;border-radius:5px} .note{border-left:3px solid #4f7dff;background:#1b2649;padding:14px 16px;border-radius:8px}</style><main class="page"><h1>star-X 支付配置说明</h1><p>支付功能默认不启用。只有在你已具备适用的主体、收款资质、税务与消费者保护安排，并且确认支付服务商条款后，才应在管理后台开启。</p><div class="note">本页是 star-X 的内部运维提示，不构成法律、税务、金融或支付合规建议。</div><h2>启用前检查</h2><ol><li>确认服务对象、定价、退款和客户支持规则。</li><li>在后台配置你自己申请的支付服务商凭据；不要使用不属于你的密钥或收款账户。</li><li>先在测试环境完成下单、回调、退款和异常订单测试。</li><li>限制管理权限，并定期核对订单与资金流水。</li></ol><h2>当前部署</h2><p>若未主动配置支付服务商和售卖计划，star-X 不会自动开始收费。</p></main></html>
